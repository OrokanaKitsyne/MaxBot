name: Run unit tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          if [ -f MaxBot/requirements.txt ]; then pip install -r MaxBot/requirements.txt; fi
          pip install groq flask gunicorn

      - name: Запустить unit-тесты
        env:
          GROQ_API_KEY: fake-key
          PYTHONPATH: MaxBot
        run: |
          python -m unittest discover -s MaxBot/tests -v
