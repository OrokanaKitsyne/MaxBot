name: Run unit tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Скачать репозиторий
        uses: actions/checkout@v4

      - name: Установить Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Установить зависимости
        run: |
          python -m pip install --upgrade pip
          if [ -f MaxBot/requirements.txt ]; then pip install -r MaxBot/requirements.txt; fi
          pip install pytest pytest-cov groq flask gunicorn

      - name: Запустить тесты с покрытием
        env:
          GROQ_API_KEY: fake-key
          PYTHONPATH: MaxBot
        run: |
          pytest MaxBot/tests -v --cov=MaxBot --cov-report=term-missing --cov-report=html

      - name: Сохранить HTML-отчёт покрытия
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: htmlcov
